server:
  port: 8087
  address: 0.0.0.0
  servlet:
    context-path: /api

spring:
  application:
    name: component-service

component:
  storage:
    # 按要求：保存到 component-service/Userdata/用户ID/...
    base-dir: Userdata
  llm:
    # llm-service 的地址（本地开发）
    base-url: http://localhost:8082
    provider: qwen
    prompt-key: ppt-component-html

management:
  endpoints:
    web:
      exposure:
        include: "*"

