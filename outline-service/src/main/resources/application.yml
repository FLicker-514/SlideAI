server:
  # 端口被占用时可设置环境变量 OUTLINE_SERVICE_PORT=8084
  port: ${OUTLINE_SERVICE_PORT:8083}
  address: 0.0.0.0

spring:
  application:
    name: outline-service

# AI 部分由本目录下 Python outline_service 通过 CLI 调用
outline:
  python:
    command: python3
    # 相对项目根或绝对路径；从根目录 mvn -pl outline-service 运行时用 outline-service
    workspace: ${OUTLINE_PYTHON_WORKSPACE:outline-service}
  timeout-seconds: 120
