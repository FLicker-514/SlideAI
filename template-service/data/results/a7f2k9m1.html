<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>A1 封面/标题</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 24px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .slide { width: 960px; height: 540px; background: #fff; border: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; }
    .main-title { font-size: 42px; font-weight: 600; color: #333; margin-bottom: 16px; text-align: center; }
    .sub-title { font-size: 22px; color: #666; margin-bottom: 48px; }
    .meta { font-size: 16px; color: #999; }
    .meta span { margin: 0 12px; }
  </style>
</head>
<body>
  <div class="slide">
    <h1 class="main-title">主标题：项目名称或演讲主题</h1>
    <p class="sub-title">副标题或一句话描述</p>
    <div class="meta">
      <span>演讲人：张三</span>
      <span>日期：2025年3月</span>
    </div>
  </div>
</body>
</html>
