<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>A2 目录/议程</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 24px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .slide { width: 960px; height: 540px; background: #fff; border: 1px solid #ddd; padding: 48px; }
    .title { font-size: 28px; font-weight: 600; color: #333; margin-bottom: 40px; }
    .toc-list { list-style: none; }
    .toc-list li { font-size: 20px; color: #333; padding: 14px 0; border-bottom: 1px solid #eee; display: flex; align-items: center; }
    .toc-list li::before { content: attr(data-num); width: 28px; height: 28px; background: #e0e0e0; color: #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-right: 16px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="slide">
    <h2 class="title">目录</h2>
    <ul class="toc-list">
      <li data-num="1">背景与目标</li>
      <li data-num="2">方案与策略</li>
      <li data-num="3">实施计划</li>
      <li data-num="4">总结与展望</li>
    </ul>
  </div>
</body>
</html>
