<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>B1 分点枚举</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 24px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .slide { width: 960px; height: 540px; background: #fff; border: 1px solid #ddd; padding: 48px; }
    .title { font-size: 26px; font-weight: 600; color: #333; margin-bottom: 32px; }
    .list { list-style: none; }
    .list li { font-size: 18px; color: #333; padding: 12px 0 12px 36px; position: relative; line-height: 1.5; }
    .list li::before { content: ""; position: absolute; left: 0; top: 20px; width: 8px; height: 8px; background: #999; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="slide">
    <h2 class="title">核心要点</h2>
    <ul class="list">
      <li>第一点：简要说明第一项内容或目标</li>
      <li>第二点：简要说明第二项内容或目标</li>
      <li>第三点：简要说明第三项内容或目标</li>
      <li>第四点：简要说明第四项内容或目标</li>
    </ul>
  </div>
</body>
</html>
