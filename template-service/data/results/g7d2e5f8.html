<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>B3 人物/团队介绍</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 24px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .slide { width: 960px; height: 540px; background: #fff; border: 1px solid #ddd; padding: 48px; }
    .title { font-size: 26px; font-weight: 600; color: #333; margin-bottom: 36px; text-align: center; }
    .profiles { display: flex; gap: 40px; justify-content: center; align-items: flex-start; }
    .profile { text-align: center; max-width: 200px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: #e0e0e0; margin: 0 auto 12px; }
    .name { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 4px; }
    .title-role { font-size: 14px; color: #666; margin-bottom: 8px; }
    .bio { font-size: 13px; color: #888; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="slide">
    <h2 class="title">核心团队</h2>
    <div class="profiles">
      <div class="profile">
        <div class="avatar"></div>
        <div class="name">张三</div>
        <div class="title-role">CEO / 创始人</div>
        <div class="bio">负责战略与整体方向。</div>
      </div>
      <div class="profile">
        <div class="avatar"></div>
        <div class="name">李四</div>
        <div class="title-role">CTO</div>
        <div class="bio">负责技术与产品研发。</div>
      </div>
      <div class="profile">
        <div class="avatar"></div>
        <div class="name">王五</div>
        <div class="title-role">COO</div>
        <div class="bio">负责运营与落地执行。</div>
      </div>
    </div>
  </div>
</body>
</html>
