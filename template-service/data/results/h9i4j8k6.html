<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>E2 单一核心数据</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 24px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .slide { width: 960px; height: 540px; background: #fff; border: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; }
    .big-num { font-size: 120px; font-weight: 700; color: #333; line-height: 1; margin-bottom: 24px; }
    .desc { font-size: 22px; color: #666; text-align: center; max-width: 400px; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="big-num">150%</div>
    <p class="desc">同比增长率，下方配以简短文字解释关键指标。</p>
  </div>
</body>
</html>
