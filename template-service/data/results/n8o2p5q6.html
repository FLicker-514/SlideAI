<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>C3 路线图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 24px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .slide { width: 960px; height: 540px; background: #fff; border: 1px solid #ddd; padding: 48px; }
    .title { font-size: 26px; font-weight: 600; color: #333; margin-bottom: 40px; }
    .roadmap { display: flex; align-items: flex-start; gap: 0; border-bottom: 2px solid #ccc; padding-bottom: 24px; position: relative; }
    .roadmap::before { content: ""; position: absolute; left: 0; right: 0; bottom: 11px; height: 2px; background: #e0e0e0; z-index: 0; }
    .node { flex: 1; text-align: center; position: relative; z-index: 1; }
    .node-dot { width: 20px; height: 20px; border: 2px solid #999; background: #fff; border-radius: 50%; margin: 0 auto 12px; }
    .node-quarter { font-size: 14px; color: #666; margin-bottom: 4px; }
    .node-label { font-size: 15px; font-weight: 600; color: #333; }
  </style>
</head>
<body>
  <div class="slide">
    <h2 class="title">产品路线图</h2>
    <div class="roadmap">
      <div class="node">
        <div class="node-dot"></div>
        <div class="node-quarter">Q1 2025</div>
        <div class="node-label">基础能力</div>
      </div>
      <div class="node">
        <div class="node-dot"></div>
        <div class="node-quarter">Q2 2025</div>
        <div class="node-label">功能扩展</div>
      </div>
      <div class="node">
        <div class="node-dot"></div>
        <div class="node-quarter">Q3 2025</div>
        <div class="node-label">生态合作</div>
      </div>
      <div class="node">
        <div class="node-dot"></div>
        <div class="node-quarter">Q4 2025</div>
        <div class="node-label">规模化</div>
      </div>
    </div>
  </div>
</body>
</html>
