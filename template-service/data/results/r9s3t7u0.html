<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>D1 对比与分析</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 24px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .slide { width: 960px; height: 540px; background: #fff; border: 1px solid #ddd; padding: 48px; }
    .title { font-size: 26px; font-weight: 600; color: #333; margin-bottom: 32px; text-align: center; }
    .compare { display: flex; gap: 24px; justify-content: center; align-items: stretch; }
    .col { flex: 1; max-width: 380px; border: 1px solid #ddd; padding: 24px; }
    .col h3 { font-size: 20px; color: #333; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #999; }
    .row { display: flex; justify-content: space-between; padding: 10px 0; font-size: 15px; border-bottom: 1px solid #eee; }
    .row:last-child { border-bottom: none; }
    .row .label { color: #666; }
    .row .val { color: #333; font-weight: 500; }
    .vs { display: flex; align-items: center; font-size: 18px; color: #999; }
  </style>
</head>
<body>
  <div class="slide">
    <h2 class="title">方案 A 与 方案 B 对比</h2>
    <div class="compare">
      <div class="col">
        <h3>方案 A</h3>
        <div class="row"><span class="label">成本</span><span class="val">较低</span></div>
        <div class="row"><span class="label">周期</span><span class="val">较短</span></div>
        <div class="row"><span class="label">风险</span><span class="val">中等</span></div>
      </div>
      <div class="vs">VS</div>
      <div class="col">
        <h3>方案 B</h3>
        <div class="row"><span class="label">成本</span><span class="val">较高</span></div>
        <div class="row"><span class="label">周期</span><span class="val">较长</span></div>
        <div class="row"><span class="label">风险</span><span class="val">较低</span></div>
      </div>
    </div>
  </div>
</body>
</html>
