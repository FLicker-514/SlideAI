<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>D2 层级与架构</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 24px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .slide { width: 960px; height: 540px; background: #fff; border: 1px solid #ddd; padding: 48px; }
    .title { font-size: 26px; font-weight: 600; color: #333; margin-bottom: 36px; text-align: center; }
    .tree { display: flex; flex-direction: column; align-items: center; }
    .level { display: flex; justify-content: center; gap: 48px; margin-bottom: 24px; }
    .level-0 { margin-bottom: 16px; }
    .node { padding: 12px 24px; border: 1px solid #999; background: #fff; font-size: 15px; color: #333; }
    .node.root { font-weight: 600; }
    .connector { width: 2px; height: 20px; background: #ccc; margin: 0 auto; }
    .connectors { display: flex; justify-content: center; gap: 120px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="slide">
    <h2 class="title">组织架构（总分关系）</h2>
    <div class="tree">
      <div class="level level-0">
        <div class="node root">总负责人</div>
      </div>
      <div class="connector"></div>
      <div class="connectors"><span></span><span></span><span></span></div>
      <div class="level">
        <div class="node">部门 A</div>
        <div class="node">部门 B</div>
        <div class="node">部门 C</div>
      </div>
    </div>
  </div>
</body>
</html>
