<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>D3 包含与构成</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; padding: 24px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .slide { width: 960px; height: 540px; background: #fff; border: 1px solid #ddd; padding: 48px; }
    .title { font-size: 26px; font-weight: 600; color: #333; margin-bottom: 36px; text-align: center; }
    .composition { display: flex; justify-content: center; align-items: center; gap: 32px; }
    .pie-wrap { position: relative; width: 200px; height: 200px; }
    .pie { width: 200px; height: 200px; border-radius: 50%; background: conic-gradient(#ccc 0deg 90deg, #ddd 90deg 180deg, #e0e0e0 180deg 270deg, #e8e8e8 270deg 360deg); }
    .legend { list-style: none; }
    .legend li { font-size: 15px; color: #333; padding: 8px 0; display: flex; align-items: center; gap: 10px; }
    .legend li::before { content: ""; width: 14px; height: 14px; background: #ccc; border-radius: 2px; }
    .legend li:nth-child(2)::before { background: #ddd; }
    .legend li:nth-child(3)::before { background: #e0e0e0; }
    .legend li:nth-child(4)::before { background: #e8e8e8; }
  </style>
</head>
<body>
  <div class="slide">
    <h2 class="title">整体构成（饼状分割）</h2>
    <div class="composition">
      <div class="pie-wrap">
        <div class="pie"></div>
      </div>
      <ul class="legend">
        <li>部分 A 25%</li>
        <li>部分 B 25%</li>
        <li>部分 C 25%</li>
        <li>部分 D 25%</li>
      </ul>
    </div>
  </div>
</body>
</html>
